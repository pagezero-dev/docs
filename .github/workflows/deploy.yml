name: 🚀 Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  # This reliably gets the branch name regardless of event type
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  # This is used to determine the environment to deploy to
  APP_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

jobs:
  check:
    name: 💎 Quality check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: .tool-versions

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 💎 Quality check
        run: bun run check

  tests-e2e:
    name: 🎭 E2E tests
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: .tool-versions

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏷️ Store Playwright Version
        run: echo "PLAYWRIGHT_VERSION=`bunx playwright -V | cut -d ' ' -f2`" >> $GITHUB_ENV

      - name: 📝 Cache Playwright Browsers
        id: cache-playwright-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}

      - name: 📦 Install Playwright Browsers
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: 🛠️ Build
        run: bun run build

      - name: 🎭 Run Playwright tests
        run: bun run test:e2e

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [check, tests-e2e]
    if: github.ref == 'refs/heads/main' || github.event.pull_request.draft == false
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: .tool-versions

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏷️ Store Playwright Version
        run: echo "PLAYWRIGHT_VERSION=`bunx playwright -V | cut -d ' ' -f2`" >> $GITHUB_ENV

      - name: 📝 Cache Playwright Browsers
        id: cache-playwright-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}

      - name: 📦 Install Playwright Browsers
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: 🛠️ Build
        run: bun run build

      - name: 🚀 Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: ${{ env.APP_ENV == 'production' && 'deploy' || 'versions upload' }}
